name: Atualizar Dashboard Cursor

on:
  schedule:
    - cron: '0 14,21 * * *'
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Buscar dados e gerar dashboard
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          CURSOR_API_KEY_2: ${{ secrets.CURSOR_API_KEY_2 }}
          CURSOR_API_KEY_3: ${{ secrets.CURSOR_API_KEY_3 }}
        run: python scripts/fetch_and_build.py

      - name: Commit index.html atualizado
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Dashboard atualizado $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
