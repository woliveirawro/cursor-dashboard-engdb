image: python:3.12-slim

stages:
  - update

atualizar-dashboard:
  stage: update
  before_script:
    - apt-get update -qq && apt-get install -y -qq git
  # Roda nos agendamentos, trigger manual (UI/API) e push no main
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_PIPELINE_SOURCE == "api"'
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"'
  variables:
    GIT_DEPTH: 0
  script:
    # Configura git e injeta token antes de qualquer operação
    - git config user.name "GitLab CI Bot"
    - git config user.email "ci-bot@gitlab.com"
    - git remote set-url origin "https://oauth2:${GITLAB_TOKEN}@gitlab.com/engbr/comite_de_ia/cursor-dashboard-engdb-clone.git"
    # Sempre parte do HEAD mais recente do main para evitar conflitos
    - git fetch origin main
    - git checkout -B main origin/main
    # Executa o script para gerar os arquivos atualizados
    - python scripts/fetch_and_build.py
    # Adiciona apenas os arquivos gerados
    - git add index.html data/od_history.json
    # Só commita e faz push se houver mudanças reais
    - |
      git diff --cached --quiet \
        && echo "Sem alteracoes, nenhum commit necessario." \
        || (
          git commit -m "Dashboard atualizado $(date -u '+%Y-%m-%d %H:%M UTC')" \
          && git push origin main
        )
